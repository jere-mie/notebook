<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Notebook cover -->
  <rect x="6" y="3" width="20" height="26" rx="3" fill="#4F6AE6"/>
  <!-- Page area -->
  <rect x="9" y="5" width="15" height="22" rx="1.5" fill="#F4F6FE"/>
  <!-- Spine binding line -->
  <rect x="6" y="3" width="4" height="26" rx="2" fill="#3A55D1"/>
  <!-- Text lines -->
  <line x1="12" y1="11" x2="21" y2="11" stroke="#4F6AE6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="12" y1="15" x2="21" y2="15" stroke="#4F6AE6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="12" y1="19" x2="21" y2="19" stroke="#4F6AE6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="12" y1="23" x2="17" y2="23" stroke="#4F6AE6" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <!-- Pen overlaid -->
  <rect x="19" y="18" width="3.2" height="10" rx="1" fill="#FFD166" transform="rotate(-35 19 18)"/>
  <polygon points="19,28 21.2,26.5 20.2,29.5" fill="#F0B429"/>
</svg>
